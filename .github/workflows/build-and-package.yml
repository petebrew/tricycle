name: Build And Package

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  GH_PACKAGES_USER: petebrew

jobs:
  build-jar:
    name: Build Jar
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure Maven for GitHub Packages
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github-dendrofileio</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
              <server>
                <id>github-tridasjlib</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Validate DendroFileIO package access
        shell: bash
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          test -n "${GH_PACKAGES_TOKEN}" || { echo "GH_PACKAGES_TOKEN is not configured"; exit 1; }
          curl --silent --show-error --fail \
            -u "${GH_PACKAGES_USER}:${GH_PACKAGES_TOKEN}" \
            https://maven.pkg.github.com/petebrew/DendroFileIO/org/tridas/dendrofileio/2.0.0/dendrofileio-2.0.0.pom \
            >/dev/null

      - name: Build plain jar
        run: mvn -B -DskipTests package
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Upload jar artifacts
        uses: actions/upload-artifact@v6
        with:
          name: tricycle-jar
          path: |
            target/*.jar

  build-fat-jar:
    name: Build Fat Jar
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure Maven for GitHub Packages
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github-dendrofileio</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
              <server>
                <id>github-tridasjlib</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Validate DendroFileIO package access
        shell: bash
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          test -n "${GH_PACKAGES_TOKEN}" || { echo "GH_PACKAGES_TOKEN is not configured"; exit 1; }
          curl --silent --show-error --fail \
            -u "${GH_PACKAGES_USER}:${GH_PACKAGES_TOKEN}" \
            https://maven.pkg.github.com/petebrew/DendroFileIO/org/tridas/dendrofileio/2.0.0/dendrofileio-2.0.0.pom \
            >/dev/null

      - name: Build fat jar
        run: mvn -B -DskipTests -Pfat-jar package
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Upload fat jar artifacts
        uses: actions/upload-artifact@v6
        with:
          name: tricycle-fat-jar
          path: |
            target/*-all.jar
            target/*.jar

  package-linux-deb:
    name: Package Linux DEB
    runs-on: ubuntu-latest
    needs: build-jar
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure Maven for GitHub Packages
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github-dendrofileio</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
              <server>
                <id>github-tridasjlib</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GH_PACKAGES_USER: petebrew
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build Linux DEB package
        run: mvn -B -DskipTests -Pjpackage,jpackage-linux-deb verify
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Upload Linux DEB artifacts
        uses: actions/upload-artifact@v6
        with:
          name: tricycle-linux-deb
          path: |
            target/jpackage-linux/**/*.deb
            target/jpackage/**/*

  package-linux-rpm:
    name: Package Linux RPM
    runs-on: ubuntu-latest
    needs: build-jar
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure Maven for GitHub Packages
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github-dendrofileio</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
              <server>
                <id>github-tridasjlib</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GH_PACKAGES_USER: petebrew
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build Linux RPM package
        run: mvn -B -DskipTests -Pjpackage,jpackage-linux-rpm verify
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Upload Linux RPM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: tricycle-linux-rpm
          path: |
            target/jpackage-linux/**/*.rpm
            target/jpackage/**/*

  package-windows:
    name: Package Windows ${{ matrix.installer_type }}
    runs-on: windows-latest
    needs: build-jar
    strategy:
      fail-fast: false
      matrix:
        installer_type:
          - msi
          - exe
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure Maven for GitHub Packages
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github-dendrofileio</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
              <server>
                <id>github-tridasjlib</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GH_PACKAGES_USER: petebrew
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build Windows installer
        run: mvn -B -DskipTests "-Djpackage.windows.type=${{ matrix.installer_type }}" "-Pjpackage,jpackage-windows" clean verify
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: tricycle-windows-${{ matrix.installer_type }}
          path: |
            target/jpackage-windows/**/*.${{ matrix.installer_type }}
            target/jpackage-windows/**/*

  package-macos:
    name: Package macOS App Bundle
    runs-on: macos-latest
    needs: build-jar
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure Maven for GitHub Packages
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github-dendrofileio</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
              <server>
                <id>github-tridasjlib</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GH_PACKAGES_USER: petebrew
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build macOS app bundle
        run: mvn -B -DskipTests -Pjpackage,jpackage-macos clean verify
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: tricycle-macos-app-bundle
          path: |
            target/jpackage-macos/**/*.app
            target/jpackage-macos/**/*
