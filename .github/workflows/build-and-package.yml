          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github-dendrofileio</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
              <server>
                <id>github-tridasjlib</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GH_PACKAGES_USER: petebrew
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build Linux DEB package
        run: mvn -B -DskipTests -Pjpackage,jpackage-linux-deb verify

      - name: Upload Linux DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tricycle-linux-deb
          path: |
            target/jpackage-linux/**/*.deb
            target/jpackage/**/*

