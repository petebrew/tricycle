name: Build And Package

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build-jar:
    name: Build Jar
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure Maven for GitHub Packages
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github-dendrofileio</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
              <server>
                <id>github-tridasjlib</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GH_PACKAGES_USER: petebrew
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build plain jar
        run: mvn -B -DskipTests package

      - name: Upload jar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tricycle-jar
          path: |
            target/*.jar

  build-fat-jar:
    name: Build Fat Jar
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure Maven for GitHub Packages
        shell: bash
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github-dendrofileio</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
              <server>
                <id>github-tridasjlib</id>
                <username>${env.GH_PACKAGES_USER}</username>
                <password>${env.GH_PACKAGES_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GH_PACKAGES_USER: petebrew
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build fat jar
        run: mvn -B -DskipTests -Pfat-jar package

      - name: Upload fat jar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tricycle-fat-jar
          path: |
            target/*-all.jar
            target/*.jar

  package-linux-deb:
    name: Package Linux DEB
